server:
  port: 8082
spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  application:
    name: mall-file
  cloud:
    nacos:
      config:
        file-extension: yaml
        server-addr: localhost:18848
      discovery:
        #Nacos的注册地址
        server-addr: localhost:18848
minio:
  endpoint: http://localhost:9000
  accessKey: admin
  secretKey: 12345678
  bucketName: mall-file #

#日志配置
logging:
  pattern:
    console: "%msg%n"